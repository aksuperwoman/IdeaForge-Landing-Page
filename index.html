<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nemotron Agent Room</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0f;--bg2:#1a1a1b;--bg3:#222223;--bg4:#2a2a2c;--border:#2e2e32;
  --text:#e8e8ec;--muted:#77778a;--dim:#55556a;
  --planner:#7F77DD;--coder:#378ADD;--critic:#D85A30;--researcher:#1D9E75;--summarizer:#EF9F27;
  --human:#9CA3AF;--red:#ef4444;--green:#22c55e;--radius:10px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,system-ui,sans-serif;font-size:14px;line-height:1.6}

/* SETUP SCREEN */
#setup{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.setup-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:420px;max-width:92vw}
.setup-card h1{font-size:1.5rem;font-weight:700;margin-bottom:4px;background:linear-gradient(135deg,var(--planner),var(--coder));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.setup-card .sub{font-size:13px;color:var(--muted);margin-bottom:1.5rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
.field input:focus{border-color:var(--planner)}
.field .hint{font-size:11px;color:var(--dim);margin-top:4px}
.btn{padding:10px 22px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--planner);color:#fff;width:100%}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);padding:7px 14px;font-size:12px}
.btn-ghost:hover{color:var(--text);border-color:var(--muted)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.btn-danger:hover{background:rgba(239,68,68,.25)}

/* APP LAYOUT */
#app{display:none;height:100vh;grid-template-columns:240px 1fr}
#app.active{display:grid}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:1rem}
.main{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* SIDEBAR */
.sb-section{margin-bottom:1.25rem}
.sb-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.sb-room{font-size:15px;font-weight:600;color:var(--text)}
.sb-session{font-size:12px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px}
.sb-session code{background:var(--bg3);padding:2px 8px;border-radius:4px;font-family:monospace;font-size:11px;cursor:pointer}
.sb-session code:hover{background:var(--bg4)}

.agent-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px}
.agent-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.agent-dot.online{background:var(--green);box-shadow:0 0 6px rgba(34,197,94,.4)}
.agent-name{color:var(--text);font-weight:500}
.agent-role{font-size:11px;color:var(--dim)}

.sb-toggles{margin-top:auto;padding-top:1rem;border-top:1px solid var(--border)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:12px;color:var(--muted)}
.toggle{position:relative;width:36px;height:20px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:var(--bg4);border-radius:10px;transition:.2s}
.toggle .slider:before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#555;top:2px;left:2px;transition:.2s}
.toggle input:checked+.slider{background:var(--planner)}
.toggle input:checked+.slider:before{transform:translateX(16px);background:#fff}

/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 1.25rem;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-title{font-weight:600;font-size:14px}
.mobile-menu{display:none}
.chain-breadcrumb{font-size:11px;color:var(--muted);background:var(--bg3);padding:3px 10px;border-radius:12px;display:flex;align-items:center;gap:4px}
.chain-breadcrumb .arrow{color:var(--planner)}
#stopBtn{display:none;margin-left:auto}
#stopBtn.active{display:inline-flex}

/* MESSAGES */
#messages{flex:1;overflow-y:auto;padding:1rem 1.25rem;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.msg{display:flex;gap:10px;max-width:85%;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.human{align-self:flex-end;flex-direction:row-reverse}
.msg.system{align-self:center;max-width:90%}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#fff}
.msg-body{flex:1;min-width:0}
.msg-header{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.msg-sender{font-size:12px;font-weight:600}
.msg-time{font-size:11px;color:var(--dim)}
.msg-badge{font-size:9px;background:var(--bg4);color:var(--muted);padding:1px 6px;border-radius:8px;font-weight:500}
.retry-btn{margin-top:8px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.28);color:#f87171;border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer}
.retry-btn:hover{background:rgba(239,68,68,.2)}
.msg-text{font-size:14px;line-height:1.65;word-break:break-word}
.msg-text p{margin-bottom:6px}
.msg-text p:last-child{margin-bottom:0}
.msg-text code{background:var(--bg4);padding:1px 5px;border-radius:4px;font-family:'Fira Code',monospace;font-size:12.5px}
.msg.human .msg-body{background:rgba(127,119,221,.1);border:1px solid rgba(127,119,221,.2);border-radius:12px 12px 2px 12px;padding:10px 14px}
.msg.agent .msg-body{background:var(--bg2);border:1px solid var(--border);border-radius:12px 12px 12px 2px;padding:10px 14px}
.msg.system .msg-body{text-align:center;background:transparent;border:1px dashed var(--border);border-radius:8px;padding:8px 14px;font-size:12px;color:var(--muted)}

/* MENTION PILL */
.mention{font-weight:600;padding:1px 6px;border-radius:6px;font-size:12.5px;cursor:default}
.mention[data-agent="planner"]{background:rgba(127,119,221,.15);color:var(--planner)}
.mention[data-agent="coder"]{background:rgba(55,138,221,.15);color:var(--coder)}
.mention[data-agent="critic"]{background:rgba(216,90,48,.15);color:var(--critic)}
.mention[data-agent="researcher"]{background:rgba(29,158,117,.15);color:var(--researcher)}
.mention[data-agent="summarizer"]{background:rgba(239,159,39,.15);color:var(--summarizer)}

/* CODE BLOCK */
.code-block{position:relative;margin:8px 0;border-radius:8px;overflow:hidden;background:#0d0d0e;border:1px solid var(--border)}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--bg3);font-size:11px;color:var(--muted)}
.code-copy{background:transparent;border:1px solid var(--border);color:var(--muted);padding:2px 8px;border-radius:4px;font-size:10px;cursor:pointer}
.code-copy:hover{color:var(--text);border-color:var(--muted)}
.code-block pre{margin:0;padding:12px;overflow-x:auto;font-family:'Fira Code',monospace;font-size:12.5px;line-height:1.6;color:#d4d4d8}
.code-block code{background:transparent;padding:0}

/* THINKING TOGGLE */
.thinking-toggle{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dim);cursor:pointer;margin-top:6px;padding:4px 0;user-select:none}
.thinking-toggle:hover{color:var(--muted)}
.thinking-toggle .arrow{transition:transform .15s;font-size:9px}
.thinking-toggle.open .arrow{transform:rotate(90deg)}
.thinking-content{display:none;margin-top:4px;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--dim);font-family:'Fira Code',monospace;line-height:1.6;white-space:pre-wrap;max-height:200px;overflow-y:auto}
.thinking-toggle.open+.thinking-content{display:block}

/* STREAMING */
.streaming-cursor{display:inline-block;width:2px;height:1em;background:var(--planner);margin-left:2px;animation:blink .8s step-end infinite;vertical-align:text-bottom}
@keyframes blink{50%{opacity:0}}

/* INPUT BAR */
#input-area{padding:12px 1.25rem;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;position:relative}
#input-row{display:flex;gap:8px;align-items:flex-end}
#msg-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit;resize:none;outline:none;min-height:42px;max-height:120px;line-height:1.5}
#msg-input:focus{border-color:var(--planner)}
#send-btn{padding:10px 18px;border-radius:10px;background:var(--planner);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;height:42px}
#send-btn:hover{opacity:.85}
#send-btn:disabled{opacity:.35;cursor:not-allowed}

/* MENTION AUTOCOMPLETE */
#mention-popup{display:none;position:absolute;bottom:100%;left:0;margin-bottom:6px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4);min-width:200px;z-index:100}
#mention-popup.show{display:block}
.mention-opt{padding:8px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}
.mention-opt:hover,.mention-opt.selected{background:var(--bg3)}
.mention-opt .ao-dot{width:8px;height:8px;border-radius:50%}
.mention-opt .ao-role{font-size:11px;color:var(--dim);margin-left:auto}

/* SETTINGS PANEL */
#settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
#settings-overlay.show{display:flex}
.settings-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2rem;width:440px;max-width:92vw;max-height:85vh;overflow-y:auto}
.settings-box h2{font-size:1.1rem;font-weight:700;margin-bottom:1rem}
.s-field{margin-bottom:1rem}
.s-field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
.s-field input[type="text"],.s-field input[type="password"],.s-field input[type="number"]{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
.s-field input:focus{border-color:var(--planner)}
.s-field .range-row{display:flex;align-items:center;gap:10px}
.s-field input[type="range"]{flex:1;accent-color:var(--planner)}
.s-field .range-val{font-size:12px;color:var(--muted);min-width:20px;text-align:right}
.s-actions{display:flex;gap:8px;margin-top:1.25rem;justify-content:flex-end}

/* RESPONSIVE */
@media(max-width:640px){
  #app.active{grid-template-columns:1fr}
  .sidebar{display:none}
  .sidebar.mobile-open{display:flex;position:fixed;inset:0;z-index:200;width:100%}
  .mobile-menu{display:inline-flex}
  .msg{max-width:95%}
}
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup">
  <div class="setup-card">
    <h1>Nemotron Agent Room</h1>
    <div class="sub">Multi-agent chat room — 5 AI agents powered by Nemotron Ultra via OpenRouter</div>
    <div class="field">
      <label>OpenRouter API Key</label>
      <input id="s-key" type="password" placeholder="sk-or-..." autocomplete="off">
      <div class="hint">Free key from <a href="https://openrouter.ai/keys" target="_blank" style="color:var(--planner)">openrouter.ai/keys</a> — stored locally only</div>
    </div>
    <div class="field">
      <label>Room Name</label>
      <input id="s-room" type="text" value="agent-room" placeholder="agent-room">
    </div>
    <button class="btn btn-primary" id="s-enter" onclick="enterRoom()" disabled>Enter Room</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sb-section">
      <div class="sb-label">Room</div>
      <div class="sb-room" id="sb-room-name">agent-room</div>
      <div class="sb-session">Session <code id="sb-session" onclick="copySession()" title="Click to copy"></code></div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Agents Online</div>
      <div id="sb-agents"></div>
    </div>
    <div class="sb-toggles">
      <div class="toggle-row"><span>Agent chaining</span><label class="toggle"><input type="checkbox" id="t-chain" checked><span class="slider"></span></label></div>
      <div class="toggle-row"><span>Auto-route to planner</span><label class="toggle"><input type="checkbox" id="t-autoroute" checked><span class="slider"></span></label></div>
      <div class="toggle-row" style="margin-top:8px"><button class="btn btn-ghost btn-sm" onclick="openSettings()">Settings</button><button class="btn btn-ghost btn-sm" onclick="exportChat()">Export</button></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <button class="btn btn-ghost btn-sm mobile-menu" onclick="toggleSidebar()">Menu</button>
      <div class="topbar-title" id="tb-room">agent-room</div>
      <div class="chain-breadcrumb" id="chain-crumb" style="display:none"></div>
      <button class="btn btn-danger btn-sm" id="stopBtn" onclick="interruptAll()">Stop agents</button>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <div id="mention-popup"></div>
      <div id="input-row">
        <textarea id="msg-input" rows="1" placeholder="Type a message... (@ to mention an agent)" oninput="onInput(this)" onkeydown="onKey(event)"></textarea>
        <button id="send-btn" onclick="humanSend()">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS OVERLAY -->
<div id="settings-overlay" onclick="if(event.target===this)closeSettings()">
  <div class="settings-box">
    <h2>Settings</h2>
    <div class="s-field">
      <label>API Key</label>
      <div style="display:flex;gap:6px">
        <input id="set-key" type="password" style="flex:1" placeholder="sk-or-...">
        <button class="btn btn-ghost btn-sm" onclick="toggleSetKeyVis()">Show</button>
      </div>
    </div>
    <div class="s-field">
      <label>Max Chain Depth: <span id="set-depth-val">3</span></label>
      <div class="range-row"><input type="range" id="set-depth" min="1" max="5" value="3" oninput="document.getElementById('set-depth-val').textContent=this.value"></div>
    </div>
    <div class="s-field">
      <label>Context Window: <span id="set-ctx-val">6</span> messages</label>
      <div class="range-row"><input type="range" id="set-ctx" min="3" max="6" value="6" oninput="document.getElementById('set-ctx-val').textContent=this.value"></div>
    </div>
    <div class="s-actions">
      <button class="btn btn-ghost btn-sm" onclick="clearHistory()">Clear History</button>
      <button class="btn btn-ghost btn-sm" onclick="saveSettings()">Save</button>
      <button class="btn btn-ghost btn-sm" onclick="closeSettings()">Close</button>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const MODEL = 'nvidia/nemotron-3-ultra-550b-a55b:free';
const API_URL = 'https://openrouter.ai/api/v1/chat/completions';

// ===== AGENTS =====
const AGENTS = {
  planner: {
    name: 'Planner', role: 'Task decomposition', color: '#7F77DD',
    system: 'You are @planner, a task decomposition agent. Break ideas into concrete steps, coordinate other agents by @mentioning them. Reply in 2-4 sentences. If code is needed, @mention @coder.'
  },
  coder: {
    name: 'Coder', role: 'Code writer', color: '#378ADD',
    system: 'You are @coder, a code writer. Write clean, runnable code. When producing code, return JSON: {"text":"explanation","code":"full code here"}. Reply in 2-4 sentences for prose.'
  },
  critic: {
    name: 'Critic', role: 'Reviewer & debugger', color: '#D85A30',
    system: 'You are @critic, a code and content reviewer. Find issues, suggest improvements, be specific and constructive. Reply in 2-4 sentences.'
  },
  researcher: {
    name: 'Researcher', role: 'Facts & reasoning', color: '#1D9E75',
    system: 'You are @researcher, a facts and reasoning agent. Cite sources, think deeply, provide accurate information. Reply in 2-4 sentences.'
  },
  summarizer: {
    name: 'Summarizer', role: 'Condense & synthesize', color: '#EF9F27',
    system: 'You are @summarizer, a synthesis agent. Condense threads, extract action items, highlight key decisions. Reply in 2-4 sentences.'
  }
};

// ===== STATE =====
let state = {
  apiKey: '',
  roomName: 'agent-room',
  sessionId: '',
  history: [],          // message objects
  agentQueue: [],       // pending agent IDs to respond
  chainDepth: 0,
  maxChainDepth: 3,
  contextWindow: 6,
  currentChain: [],
  streaming: false,
  interrupted: false,
  currentAbort: null,
  currentStreamEl: null,
  currentItem: null,
  processing: false,
  mentionIdx: -1,
  mentionQuery: '',
  mentionActive: false,
};

// ===== INIT =====
(function init() {
  const saved = localStorage.getItem('nemotron-room');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      state.apiKey = s.apiKey || '';
      state.roomName = s.roomName || 'agent-room';
      state.history = s.history || [];
      state.sessionId = s.sessionId || genSessionId();
      state.maxChainDepth = s.maxChainDepth || 3;
      state.contextWindow = Math.min(s.contextWindow || 6, 6);
    } catch(e) { state.sessionId = genSessionId(); }
  } else {
    state.sessionId = genSessionId();
  }

  if (state.apiKey) {
    showApp();
  } else {
    document.getElementById('setup').style.display = 'flex';
  }

  document.getElementById('s-key').addEventListener('input', function() {
    document.getElementById('s-enter').disabled = !this.value.trim();
  });
  document.getElementById('s-key').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && this.value.trim()) enterRoom();
  });
  document.getElementById('s-room').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') enterRoom();
  });

  renderAgentList();
})();

function genSessionId() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let id = '';
  for (let i = 0; i < 6; i++) id += chars[Math.floor(Math.random() * chars.length)];
  return id;
}

function saveState() {
  localStorage.setItem('nemotron-room', JSON.stringify({
    apiKey: state.apiKey,
    roomName: state.roomName,
    sessionId: state.sessionId,
    history: state.history.slice(-100),
    maxChainDepth: state.maxChainDepth,
    contextWindow: state.contextWindow
  }));
}

// ===== SETUP =====
function enterRoom() {
  const key = document.getElementById('s-key').value.trim();
  const room = document.getElementById('s-room').value.trim() || 'agent-room';
  if (!key) return;
  state.apiKey = key;
  state.roomName = room;
  saveState();
  showApp();
}

function showApp() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('sb-room-name').textContent = state.roomName;
  document.getElementById('tb-room').textContent = state.roomName;
  document.getElementById('sb-session').textContent = state.sessionId;
  renderAgentList();
  renderHistory();
  document.getElementById('msg-input').focus();
}

// ===== AGENT LIST =====
function renderAgentList() {
  const el = document.getElementById('sb-agents');
  el.innerHTML = '';
  Object.entries(AGENTS).forEach(([id, a]) => {
    el.innerHTML += `<div class="agent-item"><div class="agent-dot online" style="background:${a.color};box-shadow:0 0 6px ${a.color}44"></div><div><div class="agent-name" style="color:${a.color}">@${id}</div><div class="agent-role">${a.role}</div></div></div>`;
  });
}

// ===== RENDER HISTORY =====
function renderHistory() {
  const el = document.getElementById('messages');
  el.innerHTML = '';
  state.history.forEach(m => renderMessage(m, el));
  el.scrollTop = el.scrollHeight;
}

// ===== RENDER MESSAGE =====
function renderMessage(m, container) {
  container = container || document.getElementById('messages');
  const div = document.createElement('div');
  const isHuman = m.sender === 'human';
  const isSystem = m.sender === 'system';
  div.className = `msg ${isHuman ? 'human' : isSystem ? 'system' : 'agent'}`;
  div.dataset.id = m.id;

  if (isSystem) {
    div.innerHTML = `<div class="msg-body"><div class="msg-text">${escHtml(m.text)}</div></div>`;
    container.appendChild(div);
    return;
  }

  const agent = isHuman ? null : AGENTS[m.sender];
  const color = isHuman ? 'var(--human)' : (agent ? agent.color : '#888');
  const initials = isHuman ? 'You' : (agent ? agent.name.slice(0,2).toUpperCase() : '??');
  const senderName = isHuman ? 'You' : `@${m.sender}`;
  const badge = m.auto ? '<span class="msg-badge">auto</span>' : '';

  let bodyContent = `<div class="msg-header"><div class="msg-sender" style="color:${color}">${senderName}</div><span class="msg-time">${formatTime(m.ts)}</span>${badge}</div>`;

  // Thinking block
  if (m.thinking) {
    const thinkId = 'think-' + m.id;
    bodyContent += `<div class="thinking-toggle" onclick="this.classList.toggle('open')"><span class="arrow">▶</span> Reasoning (Nemotron)</div><div class="thinking-content">${escHtml(m.thinking)}</div>`;
  }

  // Code block
  if (m.code) {
    bodyContent += `<div class="code-block"><div class="code-header"><span>Code</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div><pre><code>${escHtml(m.code)}</code></pre></div>`;
  }

  // Text with @mentions highlighted
  const displayText = m.text || '';
  bodyContent += `<div class="msg-text">${highlightMentions(escHtml(displayText))}</div>`;
  if (m.retryAgent) {
    bodyContent += `<button class="retry-btn" onclick="retryAgentFromMsg('${m.id}')">Retry</button>`;
  }

  div.innerHTML = `<div class="avatar" style="background:${color}">${initials}</div><div class="msg-body">${bodyContent}</div>`;
  container.appendChild(div);
  return div;
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function escHtml(t) {
  return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightMentions(text) {
  return text.replace(/@(\w+)/g, (match, name) => {
    if (AGENTS[name]) {
      return `<span class="mention" data-agent="${name}">@${name}</span>`;
    }
    return match;
  });
}

// ===== COPY =====
function copySession() {
  navigator.clipboard.writeText(state.sessionId);
}
function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('code').textContent;
  navigator.clipboard.writeText(code);
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy', 1500);
}
function retryAgentFromMsg(msgId) {
  const msg = state.history.find(m => m.id === msgId);
  if (!msg || !msg.retryAgent) return;
  state.history = state.history.filter(m => m.id !== msgId);
  renderHistory();
  state.interrupted = false;
  state.agentQueue.unshift({
    agentId: msg.retryAgent,
    chainDepth: msg.retryDepth || 0,
    trigger: msg.retryTrigger || ''
  });
  saveState();
  processQueue();
}

// ===== INPUT HANDLING =====
function onInput(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  checkMention(el.value, el.selectionStart);
}

function onKey(e) {
  const popup = document.getElementById('mention-popup');
  const items = popup.querySelectorAll('.mention-opt');

  if (state.mentionActive && popup.classList.contains('show')) {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      state.mentionIdx = Math.min(state.mentionIdx + 1, items.length - 1);
      updateMentionSelection(items);
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      state.mentionIdx = Math.max(state.mentionIdx - 1, 0);
      updateMentionSelection(items);
      return;
    }
    if (e.key === 'Enter' && !e.shiftKey) {
      if (state.mentionIdx >= 0 && items[state.mentionIdx]) {
        e.preventDefault();
        selectMention(items[state.mentionIdx].dataset.agent);
        return;
      }
    }
    if (e.key === 'Escape') {
      closeMention();
      return;
    }
  }

  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    humanSend();
  }
}

function checkMention(text, cursorPos) {
  const before = text.slice(0, cursorPos);
  const match = before.match(/@(\w*)$/);
  const popup = document.getElementById('mention-popup');

  if (match) {
    state.mentionActive = true;
    state.mentionQuery = match[1].toLowerCase();
    state.mentionIdx = -1;
    showMentionPopup();
  } else {
    closeMention();
  }
}

function showMentionPopup() {
  const popup = document.getElementById('mention-popup');
  const query = state.mentionQuery;
  const matches = Object.entries(AGENTS).filter(([id]) => id.startsWith(query));

  if (matches.length === 0) { closeMention(); return; }

  popup.innerHTML = matches.map(([id, a], i) =>
    `<div class="mention-opt" data-agent="${id}" onclick="selectMention('${id}')"><div class="ao-dot" style="background:${a.color}"></div><span>@${id}</span><span class="ao-role">${a.role}</span></div>`
  ).join('');

  popup.classList.add('show');
  state.mentionIdx = 0;
  updateMentionSelection(popup.querySelectorAll('.mention-opt'));
}

function updateMentionSelection(items) {
  items.forEach((el, i) => el.classList.toggle('selected', i === state.mentionIdx));
}

function selectMention(agentId) {
  const input = document.getElementById('msg-input');
  const text = input.value;
  const pos = input.selectionStart;
  const before = text.slice(0, pos).replace(/@\w*$/, `@${agentId} `);
  const after = text.slice(pos);
  input.value = before + after;
  input.focus();
  input.setSelectionRange(before.length, before.length);
  closeMention();
}

function closeMention() {
  state.mentionActive = false;
  state.mentionIdx = -1;
  document.getElementById('mention-popup').classList.remove('show');
}

// ===== HUMAN SEND =====
function humanSend() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  closeMention();

  const msg = {
    id: crypto.randomUUID(),
    sender: 'human',
    text: text,
    code: null,
    thinking: null,
    ts: Date.now(),
    auto: false
  };
  state.history.push(msg);
  renderMessage(msg);
  scrollToBottom();
  saveState();

  // Parse mentions
  const mentions = parseMentions(text);

  if (mentions.length > 0) {
    // @ping is a human interrupt: clear pending work and make mentioned agents next.
    state.agentQueue = [];
    state.currentChain = [];
    if (state.currentAbort) state.currentAbort.abort();
    if (state.currentStreamEl) {
      state.currentStreamEl.remove();
      state.currentStreamEl = null;
    }
    state.chainDepth = 0;
    state.interrupted = false;
    mentions.forEach(a => state.agentQueue.push({ agentId: a, chainDepth: 0, trigger: text }));
    processQueue();
  } else if (document.getElementById('t-autoroute').checked) {
    // Auto-route to planner
    state.chainDepth = 0;
    state.interrupted = false;
    state.agentQueue.push({ agentId: 'planner', chainDepth: 0, trigger: text });
    processQueue();
  }
}

function parseMentions(text) {
  const found = [];
  const re = /@(\w+)/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    if (AGENTS[m[1]] && !found.includes(m[1])) found.push(m[1]);
  }
  return found;
}

// ===== QUEUE / CHAINING =====
async function processQueue() {
  if (state.processing) return;
  state.processing = true;
  if (state.interrupted || state.agentQueue.length === 0) {
    state.processing = false;
    finishQueueUi();
    return;
  }

  showStopBtn();

  while (!state.interrupted && state.agentQueue.length > 0) {
    const item = state.agentQueue.shift();
    state.currentItem = item;

    if (item.chainDepth >= state.maxChainDepth) {
      addSystemMsg(`Chain depth limit reached (${state.maxChainDepth}). Stopping auto-chain.`);
      continue;
    }

    updateBreadcrumb(item.agentId, item.chainDepth);

    const msgId = crypto.randomUUID();
    const placeholder = createStreamingMsg(msgId, item.agentId);

    try {
      const { text, thinking, code } = await streamAgent(item.agentId, item.trigger, msgId, placeholder);
      if (state.interrupted) {
        finalizeStreamingMsg(msgId, null);
        continue;
      }

      const msg = {
        id: msgId,
        sender: item.agentId,
        text: text,
        code: code,
        thinking: thinking,
        ts: Date.now(),
        auto: item.chainDepth > 0
      };
      state.history.push(msg);
      finalizeStreamingMsg(msgId, msg);
      saveState();

      if (document.getElementById('t-chain').checked && !state.interrupted) {
        const replyMentions = parseMentions(text);
        const humanMentions = parseMentions(item.trigger);
        const newMentions = replyMentions.filter(a => !humanMentions.includes(a) && a !== item.agentId);

        if (newMentions.length > 0) {
          newMentions.forEach(a => {
            state.agentQueue.push({ agentId: a, chainDepth: item.chainDepth + 1, trigger: text });
          });
        }
      }
    } catch(e) {
      finalizeStreamingMsg(msgId, null);
      if (e.name !== 'AbortError' && !state.interrupted) {
        const errorMsg = makeErrorMessage(msgId, item, e);
        state.history.push(errorMsg);
        renderMessage(errorMsg);
        saveState();
      }
    }
  }

  state.processing = false;
  state.currentItem = null;
  finishQueueUi();
}

// ===== STREAMING =====
function createStreamingMsg(msgId, agentId) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg agent';
  div.dataset.id = msgId;

  const agent = AGENTS[agentId];
  const color = agent ? agent.color : '#888';
  const initials = agent ? agent.name.slice(0,2).toUpperCase() : '??';

  div.innerHTML = `<div class="avatar" style="background:${color}">${initials}</div><div class="msg-body"><div class="msg-header"><div class="msg-sender" style="color:${color}">@${agentId}</div><span class="msg-time">${formatTime(Date.now())}</span></div><div class="msg-text" id="stream-${msgId}"><span class="streaming-cursor"></span></div></div>`;
  container.appendChild(div);
  state.currentStreamEl = div;
  scrollToBottom();
  return div;
}

function appendToStreamingMsg(msgId, text) {
  const el = document.getElementById('stream-' + msgId);
  if (!el) return;
  // Remove cursor, append text, re-add cursor
  const cursor = el.querySelector('.streaming-cursor');
  if (cursor) cursor.remove();
  el.innerHTML += escHtml(text).replace(/\n/g, '<br>') + '<span class="streaming-cursor"></span>';
  scrollToBottom();
}

function finalizeStreamingMsg(msgId, msg) {
  const streamingEl = document.getElementById('stream-' + msgId);
  if (!streamingEl) return;
  const cursor = streamingEl.querySelector('.streaming-cursor');
  if (cursor) cursor.remove();

  // Replace the streaming placeholder with full rendered message
  const wrapper = streamingEl.closest('.msg');
  if (wrapper) {
    wrapper.remove();
  }
  if (state.currentStreamEl === wrapper) state.currentStreamEl = null;

  if (msg) {
    renderMessage(msg);
  }
  scrollToBottom();
}

function makeErrorMessage(msgId, item, error) {
  const status = error.status ? `HTTP ${error.status}` : 'Request failed';
  const retryHint = error.status === 429 || error.status >= 500 ? ' OpenRouter may be busy or rate-limited.' : '';
  return {
    id: msgId,
    sender: item.agentId,
    text: `${status}: ${error.message}.${retryHint}`,
    code: null,
    thinking: null,
    ts: Date.now(),
    auto: item.chainDepth > 0,
    retryAgent: item.agentId,
    retryTrigger: item.trigger,
    retryDepth: item.chainDepth
  };
}

async function streamAgent(agentId, trigger, msgId, placeholder) {
  const controller = new AbortController();
  state.currentAbort = controller;
  state.streaming = true;

  const context = buildContext(agentId, trigger);
  let fullText = '';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${state.apiKey}`,
        'HTTP-Referer': window.location.href,
        'X-Title': 'Nemotron Agent Room'
      },
      body: JSON.stringify({
        model: MODEL,
        stream: true,
        max_tokens: 800,
        temperature: (agentId === 'coder' || agentId === 'critic') ? 0.3 : 0.7,
        messages: context
      }),
      signal: controller.signal
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const apiError = new Error(err.error?.message || res.statusText || `HTTP ${res.status}`);
      apiError.status = res.status;
      throw apiError;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      if (state.interrupted) { controller.abort(); break; }

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') return finishStreamText(fullText, agentId);
        try {
          const chunk = JSON.parse(data);
          const delta = chunk.choices?.[0]?.delta?.content || '';
          if (delta) {
            fullText += delta;
            appendToStreamingMsg(msgId, delta);
          }
        } catch {}
      }
    }
  } catch(e) {
    if (e.name === 'AbortError') throw e;
    throw e;
  } finally {
    state.streaming = false;
    state.currentAbort = null;
  }

  return finishStreamText(fullText, agentId);
}

function finishStreamText(fullText, agentId) {
  // Parse thinking blocks
  const { text, thinking } = parseNemotronReply(fullText);

  // Try to extract code from coder JSON
  let code = null;
  let displayText = text;
  if (agentId === 'coder') {
    try {
      const jsonMatch = text.match(/\{[\s\S]*?"text"[\s\S]*?"code"[\s\S]*?\}/);
      if (jsonMatch) {
        const parsed = JSON.parse(jsonMatch[0]);
        if (parsed.code) {
          code = parsed.code;
          displayText = parsed.text || '';
        }
      }
    } catch {}
  }

  return { text: displayText, thinking, code };
}

// ===== NEMOTRON PARSER =====
function parseNemotronReply(raw) {
  const thinkingParts = [];
  raw.replace(/<think>([\s\S]*?)<\/think>/g, (_, part) => {
    thinkingParts.push(part.trim());
    return '';
  });
  const thinking = thinkingParts.length ? thinkingParts.join('\n\n---\n\n') : null;
  const text = raw.replace(/<think>[\s\S]*?<\/think>/g, '').trim();
  return { text, thinking };
}

// ===== CONTEXT BUILDER =====
function buildContext(agentId, trigger) {
  const agent = AGENTS[agentId];
  const limit = Math.min(state.contextWindow, 6);
  const recentMsgs = state.history.filter(m => m.sender !== 'system').slice(-limit).map(m => ({
    role: m.sender === 'human' ? 'user' : 'assistant',
    content: `[${m.sender}]: ${m.text || ''}`
  }));

  return [
    { role: 'system', content: agent.system },
    ...recentMsgs
  ];
}

// ===== INTERRUPT =====
function interruptAll() {
  state.interrupted = true;
  state.agentQueue = [];
  if (state.currentAbort) {
    state.currentAbort.abort();
  }
  if (state.currentStreamEl) {
    state.currentStreamEl.remove();
    state.currentStreamEl = null;
  }
  finishQueueUi();
  addSystemMsg('Agents stopped by user.');
}

function showStopBtn() {
  document.getElementById('stopBtn').classList.add('active');
}
function hideStopBtn() {
  document.getElementById('stopBtn').classList.remove('active');
}
function finishQueueUi() {
  hideStopBtn();
  hideBreadcrumb();
}

// ===== BREADCRUMB =====
function updateBreadcrumb(agentId, depth) {
  const el = document.getElementById('chain-crumb');
  if (depth === 0) {
    el.innerHTML = `<span class="arrow">→</span> <strong>@${agentId}</strong>`;
  } else {
    el.innerHTML += ` <span class="arrow">→</span> <strong>@${agentId}</strong>`;
  }
  el.style.display = 'flex';
}
function hideBreadcrumb() {
  const el = document.getElementById('chain-crumb');
  el.style.display = 'none';
  el.innerHTML = '';
}

// ===== SYSTEM MSG =====
function addSystemMsg(text) {
  const msg = {
    id: crypto.randomUUID(),
    sender: 'system',
    text: text,
    code: null,
    thinking: null,
    ts: Date.now(),
    auto: false
  };
  state.history.push(msg);
  renderMessage(msg);
  scrollToBottom();
}

function scrollToBottom() {
  const el = document.getElementById('messages');
  requestAnimationFrame(() => el.scrollTop = el.scrollHeight);
}

// ===== SETTINGS =====
function openSettings() {
  document.getElementById('settings-overlay').classList.add('show');
  document.getElementById('set-key').value = state.apiKey;
  document.getElementById('set-depth').value = state.maxChainDepth;
  document.getElementById('set-depth-val').textContent = state.maxChainDepth;
  document.getElementById('set-ctx').value = state.contextWindow;
  document.getElementById('set-ctx-val').textContent = state.contextWindow;
}
function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('show');
}
function saveSettings() {
  const key = document.getElementById('set-key').value.trim();
  if (key) state.apiKey = key;
  state.maxChainDepth = parseInt(document.getElementById('set-depth').value);
  state.contextWindow = Math.min(parseInt(document.getElementById('set-ctx').value), 6);
  saveState();
  closeSettings();
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('mobile-open');
}
function toggleSetKeyVis() {
  const i = document.getElementById('set-key');
  i.type = i.type === 'password' ? 'text' : 'password';
}
function clearHistory() {
  if (!confirm('Clear all chat history?')) return;
  state.history = [];
  state.agentQueue = [];
  state.chainDepth = 0;
  document.getElementById('messages').innerHTML = '';
  saveState();
  closeSettings();
}

// ===== EXPORT =====
function exportChat() {
  let text = `NEMOTRON AGENT ROOM - ${state.roomName}\nSession: ${state.sessionId}\n${'='.repeat(50)}\n\n`;
  state.history.forEach(m => {
    if (m.sender === 'system') return;
    const name = m.sender === 'human' ? 'You' : `@${m.sender}`;
    const time = formatTime(m.ts);
    text += `[${time}] ${name}:\n${m.text || ''}\n`;
    if (m.code) text += `\n--- Code ---\n${m.code}\n--- End Code ---\n`;
    text += '\n';
  });
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${state.roomName}-chat.txt`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ===== CLICK OUTSIDE MENTION =====
document.addEventListener('click', e => {
  if (!e.target.closest('#mention-popup') && !e.target.closest('#msg-input')) {
    closeMention();
  }
});
</script>
