<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdeaForge — Access The Forge</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Backgrounds */
            --bg: #0e0e0f;
            --bg2: #1c1d20;
            --bg3: #26282c;
            --panel: #1c1d20;
            --surface: #26282c;
            --line: #2d2e32;

            /* Accents */
            --ember: #ef9f27;
            --ember-dim: #b4761b;
            --steel: #378add;
            --steel-dim: #2a6aaf;

            /* Semantic */
            --crit: #d94545;
            --warn: #e6a23c;
            --safe: #4a9d5f;

            /* Text */
            --text: #f5f5f5;
            --soft: #a0a0a0;
            --muted: #666669;

            /* Typography */
            --font-display: 'Oswald', Impact, sans-serif;
            --font-body: 'Inter', 'Helvetica Neue', sans-serif;
            --font-mono: 'JetBrains Mono', 'Courier New', monospace;

            /* Effects */
            --stamp: 3px 3px 0 var(--bg);
            --panel-shadow: 6px 6px 0 rgba(0,0,0,.6);
            --border: 1px solid var(--line);
            --border-heavy: 2px solid var(--text);

            /* Patterns */
            --blueprint:
                linear-gradient(to right, rgba(255,255,255,.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,.03) 1px, transparent 1px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            background-image: var(--blueprint);
            background-size: 32px 32px;
            font-family: var(--font-body);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Ambient ember glow */
        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(239,159,39,.08), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .auth-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            background: var(--bg2);
            border: var(--border);
            box-shadow: var(--panel-shadow);
            padding: 40px;
            animation: stampIn 0.45s cubic-bezier(0.2, 1.3, 0.4, 1);
        }

        @keyframes stampIn {
            from { opacity: 0; transform: translateY(8px) scale(0.98); }
            to { opacity: 1; transform: none; }
        }

        /* Brand Header */
        .brand-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            border-bottom: var(--border-heavy);
            padding-bottom: 20px;
        }

        /* --- LOGO STYLES --- */
        .brand-logo {
            width: 44px;
            height: 44px;
            object-fit: contain; /* Keeps the image proportions correct */
            /* Optional: Uncomment the line below if your logo is a square image
               and you want the chipped corner shape from the theme */
            /* clip-path: polygon(0 0, 100% 0, 100% 80%, 80% 100%, 0 100%); */
        }

        .wordmark {
            font-family: var(--font-display);
            font-size: 26px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text);
        }

        .wordmark span {
            color: var(--ember);
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 24px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }

        label {
            font-family: var(--font-mono);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        input {
            width: 100%;
            background: var(--bg);
            color: var(--text);
            border: var(--border);
            padding: 14px 16px;
            outline: none;
            font-family: var(--font-mono);
            font-size: 14px;
            transition: border-color 0.15s;
        }

        input:focus {
            border-color: var(--ember);
        }

        input::placeholder {
            color: #444448;
        }

        .forgot-link {
            font-family: var(--font-mono);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--steel);
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: var(--text);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            min-height: 44px;
            padding: 10px 18px;
            background: var(--bg3);
            color: var(--text);
            border: var(--border);
            font-family: var(--font-display);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
        }

        .btn.primary {
            background: var(--ember);
            color: var(--bg);
            border: none;
            box-shadow: var(--stamp);
            font-weight: 700;
            margin-top: 8px;
        }

        .btn.primary:hover {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 var(--bg);
        }

        .btn.secondary {
            background: var(--bg3);
            color: var(--text);
        }

        .btn.secondary:hover {
            transform: translate(2px, 2px);
            border-color: var(--steel);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 32px 0;
            gap: 16px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--line);
        }

        .divider span {
            font-family: var(--font-mono);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        /* Footer Link */
        .signup-prompt {
            text-align: center;
            margin-top: 32px;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        .signup-prompt a {
            color: var(--steel);
            text-decoration: none;
            font-weight: 700;
        }

        .signup-prompt a:hover {
            color: var(--text);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg2);
            border: var(--border-heavy);
            padding: 12px 18px;
            color: var(--text);
            z-index: 50;
            font-family: var(--font-mono);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            box-shadow: var(--stamp);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .auth-card {
                padding: 24px;
                box-shadow: 4px 4px 0 rgba(0,0,0,.6);
            }
            .wordmark {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="brand-row">
            <!-- CHANGE YOUR LOGO HERE: Update the src to your image/svg path -->
            <img src="https://via.placeholder.com/44x44/0E0D0D/ef9f27?text=IF" alt="IdeaForge Logo" class="brand-logo">
            <h1 class="wordmark">IDEA<span>FORGE</span></h1>
        </div>

        <form id="signin-form">
            <div class="form-group">
                <div class="label-row">
                    <label for="email">Founder Email</label>
                </div>
                <input type="email" id="email" placeholder="founder@startup.io" required>
            </div>

            <div class="form-group">
                <div class="label-row">
                    <label for="password">Access Code</label>
                    <a href="#" class="forgot-link" id="forgot-password-btn">Forgot?</a>
                </div>
                <input type="password" id="password" placeholder="••••••••••••" required>
            </div>

            <button type="submit" class="btn primary" id="signin-btn">Enter The Forge</button>
        </form>

        <div class="divider">
            <span>OR CONTINUE WITH</span>
        </div>

        <button class="btn secondary" id="google-btn">
            <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"></path>
                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"></path>
                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"></path>
                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"></path>
            </svg>
            Sign in with Google
        </button>

        <p class="signup-prompt">
            No account yet? <a href="#">Request Forge Access</a>
        </p>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">Message</div>

    <script>

            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

            }
            */
        });

        // Handle Google Sign In
        document.getElementById('google-btn').addEventListener('click', async () => {
            showToast('Connecting to Google...');

            // --- FIREBASE IMPLEMENTATION ---

                const result = await signInWithPopup(auth, provider);

                window.location.href = '/dashboard'; // Redirect on success
            } catch (error) {
                console.error(error);
                showToast('Error: Google sign-in failed');
            }
            */
        });

        // Handle Forgot Password
        document.getElementById('forgot-password-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            if (!email) {
                showToast('Enter your email first');

            }

            showToast('Sending reset link...');

    </script>
</body>
</html>
